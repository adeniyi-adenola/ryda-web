<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmation</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f1f1f1;
      margin: 0;
      padding: 0;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 40px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      font-size: 2.4em;
      font-weight: 600;
      color: #4CAF50;
      margin-bottom: 20px;
    }
    .thanks-message {
      font-size: 1.2em;
      color: #555;
      margin-bottom: 40px;
    }
    .details {
      text-align: left;
      font-size: 1.1em;
      color: #333;
      line-height: 1.8;
    }
    .details p {
      margin: 12px 0;
    }
    .details p strong {
      font-weight: 600;
      color: #333;
    }
    .cta-button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 30px;
      background-color: #4CAF50;
      color: white;
      font-size: 1.1em;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    .cta-button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Thank You for Booking with Us!</h1>
    <p class="thanks-message">We’ve received your booking, and your taxi has been successfully booked. Below are your booking details:</p>
    
    <div class="details" id="booking-details"></div>

    <a href="index.html" class="cta-button">Return to Home Page</a>
  </div>

  <script>
    // Get the URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    
    // Extract the parameters and display them on the page
    const bookingDetails = `
      <p><strong>Pick Up Location:</strong> ${urlParams.get("pickup")}</p>
      <p><strong>Drop Off Location:</strong> ${urlParams.get("dropoff")}</p>
      <p><strong>Number of Passengers:</strong> ${urlParams.get("passengers")}</p>
      <p><strong>Travel Date:</strong> ${urlParams.get("date")}</p>
      <p><strong>Travel Time:</strong> ${urlParams.get("time")}</p>
      <p><strong>Car Type:</strong> ${urlParams.get("car_type")}</p>
    `;
    
    // Display the booking details on the page
    document.getElementById("booking-details").innerHTML = bookingDetails;
  </script>

</body>
</html>
